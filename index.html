<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left,#1f1f3a,transparent 30%),
  radial-gradient(circle at bottom right,#0f3460,transparent 30%),
  #070b14;
  padding:40px;
  color:white;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-2;
}

.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:#5b5bff;
  border-radius:50%;
  filter:blur(140px);
  opacity:.2;
  top:-150px;
  right:-150px;
  z-index:-1;
}

.container{
  max-width:1400px;
  margin:auto;
}

.title{
  margin-bottom:50px;
}

.title h1{
  font-size:4rem;
  background:linear-gradient(90deg,#fff,#7f8cff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.title p{
  color:#aeb7ff;
  margin-top:10px;
}

.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.card{
  position:relative;
  overflow:hidden;
  padding:30px;
  border-radius:24px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  transition:.35s;
  min-height:220px;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  border-color:#7f8cff;
  box-shadow:
  0 20px 50px rgba(91,91,255,.25),
  0 0 20px rgba(91,91,255,.15);
}

.card::before{
  content:'';
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:linear-gradient(135deg,#7f8cff,#4f46e5);
  top:-80px;
  right:-80px;
  opacity:.18;
}

.badge{
  position:absolute;
  top:18px;
  right:18px;
  padding:7px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  font-size:.8rem;
  color:#d6dcff;
}

.number{
  color:#8f9bff;
  font-size:.9rem;
  letter-spacing:2px;
  margin-bottom:16px;
  text-transform:uppercase;
}

.project-name{
  font-size:1.5rem;
  font-weight:600;
  margin-bottom:20px;
}

.open{
  position:absolute;
  bottom:28px;
  left:30px;
  color:#dfe3ff;
}

@media(max-width:700px){

  body{
    padding:25px;
  }

  .title h1{
    font-size:2.8rem;
  }

}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

  <div class="title">
    <h1>PROJECTS</h1>
    <p>My cool builds collection</p>
  </div>

  <div class="projects">

    <a class="card" href="pro1/index.html">
      <div class="badge">01</div>
      <div class="number">Project 1</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <a class="card" href="pro2/index.html">
      <div class="badge">02</div>
      <div class="number">Project 2</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <a class="card" href="pro3/index.html">
      <div class="badge">03</div>
      <div class="number">Project 3</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <a class="card" href="pro4/index.html">
      <div class="badge">04</div>
      <div class="number">Project 4</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <a class="card" href="pro5/index.html">
      <div class="badge">05</div>
      <div class="number">Project 5</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <a class="card" href="pro6/index.html">
      <div class="badge">06</div>
      <div class="number">Project 6</div>
      <div class="project-name">...</div>
      <div class="open">Open Project →</div>
    </a>

    <!-- COPY MORE UNTIL pro30 -->

  </div>

</div>

</body>
</html>
