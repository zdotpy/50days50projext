<!DOCTYPE html>
<html>
<head>
  <title>Projects</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0a0a0a;
      color:white;
      padding:40px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:50px;
      flex-wrap:wrap;
      gap:20px;
    }

    h1{
      font-size:65px;
    }

    .stats{
      display:flex;
      gap:15px;
    }

    .box{
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:18px 25px;
      min-width:130px;
    }

    .box h2{
      font-size:30px;
      margin-bottom:5px;
    }

    .box p{
      color:#888;
      font-size:14px;
    }

    .projects{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:22px;
      padding:25px;
      text-decoration:none;
      color:white;
      height:180px;
      transition:0.25s;
      position:relative;
    }

    .card:hover{
      transform:translateY(-8px);
      border-color:#555;
    }

    .number{
      position:absolute;
      top:20px;
      right:20px;
      color:#666;
      font-size:14px;
    }

    .project{
      font-size:32px;
      margin-top:35px;
      font-weight:bold;
    }

    .open{
      position:absolute;
      bottom:25px;
      color:#888;
    }

  </style>
</head>

<body>

  <div class="top">

    <h1>PROJECTS</h1>

    <div class="stats">

      <div class="box">
        <h2 id="total"></h2>
        <p>Total Projects</p>
      </div>

      <div class="box">
        <h2>HTML</h2>
        <p>CSS • JS</p>
      </div>

    </div>

  </div>

  <div class="projects" id="projects"></div>

  <script>

    let totalProjects = 31;

    let projectNames = [
      "Slide in Panels",
      "Progress Steps",
      "Rotating Navigation",
      "Blurry Loading",
      "Scroll Animation",
      "Split Landing Page",
      "Login Form",
      "Sound Board",
      "Dad Jokes",
      "Event Keycodes",
      "FAQ Collapse",
      "Random Choice Picker",
      "Animated Navigation",
      "Incrementing Counter",
      "Drink Water",
      "Movie App",
      "Background Slider",
      "Loading Animation",
      "Button Ripple Effect",
      "Drag N Drop",
      "Drawing App",
      "Kinetic Loader",
      "Live User Filter",
      "Under Construction",
      "Content Placeholder",
      "Sticky Navbar",
      "Vertical Slider",
      "Toast Notification",
      "Github Profiles",
      "Double Click Heart",
      "Password Generator",
    ];

    let projects = "";

    for(let i = 1; i <= totalProjects; i++){

      projects += `

      <a class="card" href="pro${i}/index.html">

        <div class="number">${i}</div>

        <div class="project">${projectNames[i-1]}</div>

        <div class="open">Open →</div>

      </a>

      `;

    }

    document.getElementById("projects").innerHTML = projects;

    document.getElementById("total").innerText = totalProjects;

  </script>

</body>
</html>
